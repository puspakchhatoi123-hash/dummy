<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Level Authority Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff9933, #ffffff, #138808, #4da6ff);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.register-container{
    width:450px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.register-container h2{
    text-align:center;
    margin-bottom:10px;
    color:#0d6efd;
    font-weight:700;
}

.register-container p{
    text-align:center;
    font-size:14px;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    font-size:14px;
    font-weight:500;
}

.input-group input,
.input-group select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,0.3);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff9933,#138808);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.login-link{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

.login-link a{
    color:#0d6efd;
    text-decoration:none;
    font-weight:500;
}

.login-link a:hover{
    text-decoration:underline;
}

@media(max-width:500px){
    .register-container{
        width:90%;
        padding:25px;
    }
}

</style>
</head>

<body>

<div class="register-container">

    <h2>Block Authority Registration</h2>
    <p>Official Registration Portal</p>

    <form id="registrationForm">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter Full Name" required>
        </div>

        <div class="input-group">
            <label>Authority ID</label>
            <input type="text" id="authorityId" placeholder="Create Authority ID" required>
        </div>

        <div class="input-group">
            <label>Block Name</label>
            <input type="text" id="blockName" placeholder="Enter Block Name" required>
        </div>

        <div class="input-group">
            <label>District</label>
            <input type="text" id="district" placeholder="Enter District Name" required>
        </div>

        <div class="input-group">
            <label>State</label>
            <select id="state" required>
                <option value="">Select State</option>
                <option>Odisha</option>
                <option>Maharashtra</option>
                <option>Uttar Pradesh</option>
                <option>Rajasthan</option>
                <option>West Bengal</option>
            </select>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create Password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="login-link">
        Already registered? <a href="Block_Level_Authority_Login.html">Login Here</a>
    </div>

</div>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e){
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }

    const userData = {
        fullName: document.getElementById("fullName").value,
        authorityId: document.getElementById("authorityId").value,
        blockName: document.getElementById("blockName").value,
        district: document.getElementById("district").value,
        state: document.getElementById("state").value,
        password: password
    };

    localStorage.setItem("blockAuthority", JSON.stringify(userData));

    alert("Registration Successful! Data Stored in Local Storage.");
    window.location.href = "Block_Level_Authority_Login.html";
});
</script>

</body>
</html>
