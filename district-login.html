<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District Authority Login | Governance Portal</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    padding:45px;
    width:400px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    color:white;
    position:relative;
    border-top:5px solid #ff9933;
}

.login-container::after{
    content:'';
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:5px;
    background:#138808;
    border-radius:0 0 20px 20px;
}

h2{
    text-align:center;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    font-size:14px;
    margin-bottom:25px;
    opacity:0.8;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:13px;
    display:block;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    background:#084298;
}

.register-link{
    text-align:center;
    margin-top:18px;
    font-size:13px;
}

.register-link a{
    color:#00ffcc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-container">

<h2>District Authority Login</h2>
<p class="sub">Secure District Governance Access</p>

<div class="input-group">
<label>District ID (DIST-XXXX)</label>
<input type="text" id="districtId" placeholder="Enter District ID">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<button class="login-btn" onclick="login()">Login</button>

<div class="register-link">
New Authority? <a href="district-register.html">Register Here</a>
</div>

</div>

<script>
function login(){

    let id=document.getElementById("districtId").value.trim();
    let password=document.getElementById("password").value.trim();

    if(!id || !password){
        alert("All fields are required");
        return;
    }

    let user=JSON.parse(localStorage.getItem("districtUser_"+id));

    if(!user){
        alert("District ID not found");
        return;
    }

    if(user.password!==password){
        alert("Incorrect password");
        return;
    }

    localStorage.setItem("currentRole","district");
    localStorage.setItem("districtLoggedIn",id);

    window.location="District_Level_Authority_Dashboard.html";
}
</script>

</body>
</html>
