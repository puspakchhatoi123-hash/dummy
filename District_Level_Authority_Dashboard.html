<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>District Authority Dashboard | District Portal</title>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    padding:30px;
    color:white;
}

.header{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    margin-bottom:40px;
}

h3{
    margin-bottom:20px;
    font-weight:600;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
    font-size:14px;
}

td{
    padding:10px;
    font-size:13px;
    border-bottom:1px solid #ddd;
    vertical-align:top;
}

select, textarea, input{
    width:100%;
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:12px;
}

button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    margin-top:5px;
}

.approve-btn{
    background:#198754;
    color:white;
}
.approve-btn:hover{background:#146c43;}

.sendback-btn{
    background:#ffc107;
}
.sendback-btn:hover{background:#e0a800;}

.reject-btn{
    background:#dc3545;
    color:white;
}
.reject-btn:hover{background:#bb2d3b;}

.reason-box{
    display:none;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="header">
District Level Authority Dashboard
</div>

<div class="card">

<h3>Block Approved (Resolved) Problems</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Aadhaar</th>
<th>Title</th>
<th>Description</th>
<th>Block Verified At</th>
<th>District Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<div style="text-align:center; margin:20px 0;">
    <button class="approve-btn" onclick="toggleWorkSection()">
        Development Work Management
    </button>
</div>

<div id="workSection" style="display:none;">

<div class="card">
<h3>Create Government Development Work</h3>

<table>
<tr>
<td>Work Name</td>
<td><input type="text" id="workName"></td>
</tr>

<tr>
<td>Work Type</td>
<td>
<select id="workType">
<option value="Road">Road</option>
<option value="Water Supply">Water Supply</option>
<option value="Electricity">Electricity</option>
<option value="Drainage">Drainage</option>
<option value="School Repair">School Repair</option>
<option value="Other">Other</option>
</select>
</td>
</tr>

<tr>
<td>Area</td>
<td><input type="text" id="workArea"></td>
</tr>

<tr>
<td>Total Budget (₹)</td>
<td><input type="number" id="workBudget"></td>
</tr>

<tr>
<td colspan="2" align="center">
<button class="approve-btn" onclick="createWork()">Create Work</button>
</td>
</tr>
</table>
</div>

<div class="card">
<h3>All Development Works</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
<th>Area</th>
<th>Budget</th>
<th>Status</th>
<th>Details</th>
</tr>
</thead>
<tbody id="workRows"></tbody>
</table>
</div>

</div>

<script>

/* ===== YOUR ORIGINAL PROBLEM SCRIPT (UNCHANGED) ===== */
let problems = JSON.parse(localStorage.getItem("problems")) || [];
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
let rows = document.getElementById("rows");

let filtered = problems.filter(p => p.status === "Resolved");

if(filtered.length === 0){
    rows.innerHTML =
    `<tr><td colspan="6" align="center">No Resolved problems from Block Authority</td></tr>`;
}else{
    filtered.forEach((p)=>{
        let realIndex = problems.indexOf(p);

        rows.innerHTML += `
        <tr>
            <td>${p.problemId}</td>
            <td>${p.aadhaar}</td>
            <td>${p.title}</td>
            <td>${p.description || "—"}</td>
            <td>${p.verifiedAt || "—"}</td>
            <td>
                <select id="districtStatus${realIndex}" onchange="toggleReason(${realIndex})">
                    <option value="">Select Action</option>
                    <option value="Final Approved">Final Approve</option>
                    <option value="Send Back">Send Back to Block</option>
                    <option value="District Rejected">Reject</option>
                </select>

                <div class="reason-box" id="reasonBox${realIndex}">
                    <textarea id="reason${realIndex}" placeholder="Enter reason"></textarea>
                </div>

                <button class="approve-btn" onclick="updateDistrict(${realIndex})">
                    Submit
                </button>
            </td>
        </tr>`;
    });
}

function toggleReason(i){
    let action = document.getElementById("districtStatus"+i).value;
    let box = document.getElementById("reasonBox"+i);
    box.style.display =
        (action==="Send Back" || action==="District Rejected")
        ? "block" : "none";
}

function updateDistrict(i){
    let action = document.getElementById("districtStatus"+i).value;
    let reason = document.getElementById("reason"+i)?.value.trim();

    if(!action){ alert("Please select action"); return; }
    if((action==="Send Back" || action==="District Rejected") && !reason){
        alert("Reason required"); return;
    }

    if(action==="Final Approved"){
        problems[i].status="Completed";
        problems[i].districtApprovedAt=new Date().toLocaleString();
    }

    if(action==="Send Back"){
        problems[i].status="In Progress";
        problems[i].districtRemark=reason;
    }

    if(action==="District Rejected"){
        problems[i].status="Rejected";
        problems[i].rejectReason=reason;
        problems[i].rejectedBy="District Authority";
    }

    localStorage.setItem("problems",JSON.stringify(problems));
    alert("District action completed");
    location.reload();
}

/* ================= NEW WORK SYSTEM (ADDED ONLY) ================= */

let works = JSON.parse(localStorage.getItem("developmentWorks")) || [];
let workRows = document.getElementById("workRows");

function createWork(){
    let name = document.getElementById("workName").value.trim();
    let type = document.getElementById("workType").value;
    let area = document.getElementById("workArea").value.trim();
    let budget = document.getElementById("workBudget").value;

    if(!name || !area || !budget){
        alert("All fields required");
        return;
    }

    let newWork = {
        id: "WORK" + Date.now(),
        name,
        type,
        area,
        budget,
        status: "Not Started",
        createdAt: new Date().toLocaleString()
    };

    works.push(newWork);
    localStorage.setItem("developmentWorks", JSON.stringify(works));

    alert("Work Created Successfully");

    // Clear form
    document.getElementById("workName").value = "";
    document.getElementById("workArea").value = "";
    document.getElementById("workBudget").value = "";
    document.getElementById("workType").selectedIndex = 0;

    // Update works table dynamically
    workRows.innerHTML = "";
    loadWorks();
}

function loadWorks(){
    if(works.length===0){
        workRows.innerHTML =
        `<tr><td colspan="7" align="center">No Works Created</td></tr>`;
        return;
    }

    works.forEach(w=>{
        workRows.innerHTML += `
        <tr>
            <td>${w.id}</td>
            <td>${w.name}</td>
            <td>${w.type}</td>
            <td>${w.area}</td>
            <td>₹ ${w.budget}</td>
            <td>${w.status}</td>
            <td>Created: ${w.createdAt}</td>
        </tr>`;
    });
}

loadWorks();

function toggleWorkSection(){
    let section = document.getElementById("workSection");
    section.style.display =
        section.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
