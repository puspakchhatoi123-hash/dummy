<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovtConnect - Sarpanch Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* SAME EXACT STYLE AS LOGIN PAGE */
:root {
    --primary: #0047AB;
    --primary-dark: #002D62;
    --saffron: #FF9933;
    --green: #198754;
    --bg-light: #f4f6f9;
    --transition: all 0.3s ease;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#fdfbfb 0%,#ebedee 100%);
    padding:20px;
}

.auth-container{
    background:white;
    width:100%;
    max-width:450px;
    padding:40px;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.1);
    border-top:5px solid var(--saffron);
    position:relative;
}

.auth-container::after{
    content:'';
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:5px;
    background:var(--green);
    border-radius:0 0 24px 24px;
}

.auth-container h2{
    text-align:center;
    margin-bottom:20px;
    color:var(--primary-dark);
}

.form-group{margin-bottom:15px;}
.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    font-size:0.8rem;
}

.form-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

.auth-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--green);
    color:white;
    font-weight:700;
    cursor:pointer;
}

.auth-btn:hover{
    background:#146c43;
}

.id-text{
    font-size:1.5rem;
    font-weight:800;
    color:var(--green);
    text-align:center;
    margin-top:20px;
}

.toggle-link{
    text-align:center;
    margin-top:20px;
    font-size:0.85rem;
}

.toggle-link a{
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
}

.emblem{
    width:50px;
    margin:0 auto 15px;
    display:block;
}
</style>
</head>
<body>

<div class="auth-container">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" class="emblem">

<h2>Official Registration</h2>

<div id="regForm">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="regName">
</div>

<div class="form-group">
<label>Aadhaar Number</label>
<input type="text" id="regAadhaar" maxlength="12">
</div>

<div class="form-group">
<label>Gram Panchayat</label>
<input type="text" id="regPanchayat">
</div>

<button class="auth-btn" onclick="handleRegister()">Generate SP-ID</button>
</div>

<div id="idRevealBox" style="display:none;">
<div class="id-text" id="generatedIDDisplay"></div>
<p style="text-align:center;">Save this ID for login.</p>
</div>

<div class="toggle-link">
Already registered? <a href="sarpanch-login.html">Login</a>
</div>

</div>

<script>
function handleRegister(){
    const name=document.getElementById('regName').value.trim();
    const aadhaar=document.getElementById('regAadhaar').value.trim();
    const panchayat=document.getElementById('regPanchayat').value.trim();

    if(!name||aadhaar.length!==12||!panchayat)
        return alert("Valid details required.");

    const uniqueID="SP-"+Math.floor(1000+Math.random()*9000);
    const userData={name,aadhaar,panchayat,spID:uniqueID};

    localStorage.setItem(`user_${aadhaar}`,JSON.stringify(userData));

    document.getElementById('regForm').style.display="none";
    document.getElementById('idRevealBox').style.display="block";
    document.getElementById('generatedIDDisplay').innerText=uniqueID;
}
</script>

</body>
</html>
