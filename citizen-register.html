<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Registration | District Development Portal</title>

<style>
/* Modern, clean typography */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --accent: #f59e0b;
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
}

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text-main);
}
 
/* Elegant Header */
.header {
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    letter-spacing: 0.5px;
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
}

/* Container Card */
.container {
    width: 100%;
    max-width: 460px;
    margin: 40px auto;
    background: var(--card-bg);
    padding: 50px;
    border-radius: 28px;
    box-shadow: 
        0 10px 15px -3px rgba(0, 0, 0, 0.05),
        0 25px 50px -12px rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.6);
    animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    margin-top: 0;
    margin-bottom: 25px;
    text-align: center;
    color: var(--text-main);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -1px;
}

.note {
    background: #f0f9ff;
    padding: 16px;
    font-size: 14px;
    line-height: 1.5;
    color: #0369a1;
    border-left: 5px solid var(--primary);
    border-radius: 12px;
    margin-bottom: 30px;
    font-weight: 500;
}

label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 14px 18px;
    margin-top: 0;
    margin-bottom: 0;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    font-size: 16px;
    font-family: inherit;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
    background: #f8fafc;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1);
    transform: translateY(-1px);
}

button {
    width: 100;
    padding: 16px;
    margin-top: 35px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.4);
    filter: brightness(1.1);
}

button:active {
    transform: translateY(0);
}

.link {
    text-align: center;
    margin-top: 30px;
    font-size: 15px;
    color: var(--text-muted);
}

.link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    margin-left: 5px;
    transition: color 0.2s;
}

.link a:hover {
    color: var(--primary-dark);
    text-decoration: underline;
}

/* Mobile Responsiveness */
@media (max-width: 480px) {
    .container {
        width: 92%;
        padding: 35px 20px;
        margin: 20px auto;
    }
    h2 { font-size: 26px; }
}
</style>
</head>

<body>

<div class="header">
    District Development & Public Issues Portal
</div>

<div class="container">
    <h2>Citizen Registration</h2>

    <div class="note">
        Please enter correct details. This registration is for district-level development services.
    </div>

    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter full name">

    <label>Aadhaar Number</label>
    <input type="text" id="aadhaar" placeholder="Enter Aadhaar number">

    <label>Password</label>
    <input type="password" id="password" placeholder="Create password">

    <button onclick="register()">Register Account</button>

    <div class="link">
        Already registered? <a href="citizen-login.html">Login here</a>
    </div>
</div>

<script>
function register(){
    let name = document.getElementById("name").value.trim();
    let aadhaar = document.getElementById("aadhaar").value.trim();
    let password = document.getElementById("password").value;

    if(!name || !aadhaar || !password){
        alert("All fields are required");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(users.find(u => u.aadhaar === aadhaar)){
        alert("Aadhaar already registered");
        return;
    }

    users.push({
        name:name,
        aadhaar:aadhaar,
        password:password,
        photo:""
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration successful");
    window.location.href = "citizen-login.html";
}
</script>

</body>
</html>
