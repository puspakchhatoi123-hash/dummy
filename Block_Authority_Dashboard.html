<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Authority Dashboard | District Portal</title>

<style>
/* ======= YOUR ORIGINAL CSS (UNCHANGED) ======= */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9933,#ffffff,#138808,#4da6ff);
    background-size:400% 400%;
    animation: bg 12s infinite;
}
@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.header{
    background:#0d6efd;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

.container{
    padding:25px;
}

.card{
    background:rgba(255,255,255,0.95);
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    margin-bottom:25px;
}

h3{
    margin-bottom:20px;
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    vertical-align:top;
    font-size:14px;
}

th{
    background:#e7f1ff;
}

select, textarea{
    width:100%;
    padding:6px;
    border-radius:4px;
    border:1px solid #ccc;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
}

.update-btn{
    background:#198754;
    color:white;
}
.update-btn:hover{
    background:#146c43;
}

.delete-btn{
    background:#dc3545;
    color:white;
    margin-left:5px;
}
.delete-btn:hover{
    background:#bb2d3b;
}

.reason-box{
    display:none;
    margin-top:6px;
}

.reject-label{
    font-size:12px;
    font-weight:bold;
    margin-top:5px;
    color:#6f42c1;
}

/* ===== NEW ATTRACTIVE WORK SECTION STYLE ===== */

.work-card{
    background:rgba(255,255,255,0.9);
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    border-left:6px solid #0d6efd;
}

.work-btn{
    background:#0d6efd;
    color:white;
    padding:8px 15px;
    font-weight:bold;
}
.work-btn:hover{
    background:#084298;
}
</style>
</head>

<body>

<div class="header">
Block Level Authority Dashboard
</div>

<div class="container">

<div class="card">
<h3>Sarpanch Approved Problems</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Aadhaar</th>
<th>Title</th>
<th>Description</th>
<th>Submitted</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<!-- ===== NEW BUTTON ADDED ===== -->

<div style="text-align:center; margin:20px 0;">
    <button class="work-btn" onclick="toggleWorkSection()">
        View Government Development Works
    </button>
</div>

<!-- ===== NEW WORK SECTION ADDED ===== -->

<div id="workSection" style="display:none;">
<div class="work-card">

<h3>Government Development Works (From District Authority)</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Work Name</th>
<th>Type</th>
<th>Area</th>
<th>Total Budget (₹)</th>
<th>Status</th>
<th>Created At</th>
</tr>
</thead>
<tbody id="workRows"></tbody>
</table>

</div>
</div>

</div>

<script>

/* ===== YOUR ORIGINAL SCRIPT (UNCHANGED) ===== */
let problems = JSON.parse(localStorage.getItem("problems")) || [];
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
let rows = document.getElementById("rows");

let filtered = problems.filter(p => p.status !== "Submitted");

if(filtered.length === 0){
    rows.innerHTML =
    `<tr><td colspan="7" align="center">No approved problems from Sarpanch</td></tr>`;
}else{
    filtered.forEach((p,index)=>{
        let realIndex = problems.indexOf(p);

        rows.innerHTML += `
        <tr>
            <td>${p.problemId}</td>
            <td>${p.aadhaar}</td>
            <td>${p.title}</td>
            <td>${p.description || "—"}</td>
            <td>${p.submittedAt}</td>
            <td>
                <select id="status${realIndex}" onchange="toggleReason(${realIndex})">
                    <option ${p.status==="In Progress"?"selected":""}>In Progress</option>
                    <option ${p.status==="Resolved"?"selected":""}>Resolved</option>
                    <option ${p.status==="Rejected"?"selected":""}>Rejected</option>
                </select>

                ${p.status === "Rejected" ? `
                    <div class="reject-label">
                        Rejected by ${p.rejectedBy}
                    </div>
                ` : ``}

                <div class="reason-box" id="reasonBox${realIndex}">
                    <textarea id="reason${realIndex}" placeholder="Rejection reason">${p.rejectReason || ""}</textarea>
                </div>
            </td>
            <td>
                <button class="update-btn" onclick="updateStatus(${realIndex})">Update</button>
                <button class="delete-btn" onclick="deleteProblem(${realIndex})">Delete</button>
            </td>
        </tr>`;
    });

    problems.forEach((p,i)=>{
        if(p.status==="Rejected"){
            document.getElementById("reasonBox"+i).style.display="block";
        }
    });
}

function toggleReason(i){
    let status=document.getElementById("status"+i).value;
    let box=document.getElementById("reasonBox"+i);
    box.style.display=(status==="Rejected")?"block":"none";
}

function updateStatus(i){
    let status=document.getElementById("status"+i).value;
    let reason=document.getElementById("reason"+i)?.value.trim();

    if(status==="Rejected" && !reason){
        alert("Rejection reason required");
        return;
    }

    problems[i].status=status;
    problems[i].verifiedAt=new Date().toLocaleString();

    localStorage.setItem("problems",JSON.stringify(problems));
    alert("Updated successfully");
    location.reload();
}

function deleteProblem(i){
    if(!confirm("Delete this problem?")) return;
    problems.splice(i,1);
    localStorage.setItem("problems",JSON.stringify(problems));
    location.reload();
}

/* ===== NEW WORK DISPLAY SCRIPT ADDED ===== */

function toggleWorkSection(){
    let section = document.getElementById("workSection");
    section.style.display =
        section.style.display === "none" ? "block" : "none";
}

let works = JSON.parse(localStorage.getItem("developmentWorks")) || [];
let workRows = document.getElementById("workRows");

if(works.length === 0){
    workRows.innerHTML =
    `<tr><td colspan="7" align="center">No Development Works Created Yet</td></tr>`;
}else{
    works.forEach(w=>{
        workRows.innerHTML += `
        <tr>
            <td>${w.id}</td>
            <td>${w.name}</td>
            <td>${w.type}</td>
            <td>${w.area}</td>
            <td>₹ ${w.budget}</td>
            <td>${w.status}</td>
            <td>${w.createdAt}</td>
        </tr>`;
    });
}

</script>

</body>
</html>
