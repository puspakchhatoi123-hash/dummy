<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sarpanch Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0d6efd,#20c997,#ffffff);
    min-height:100vh;
    overflow-x:hidden;
}

/* HEADER */
.header{
    background:rgba(13,110,253,0.95);
    color:white;
    padding:18px;
    display:flex;
    align-items:center;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.menu-btn{
    font-size:24px;
    margin-right:15px;
    cursor:pointer;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:-250px;
    width:250px;
    height:100%;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(12px);
    box-shadow:5px 0 25px rgba(0,0,0,0.2);
    transition:0.4s;
    padding-top:70px;
    z-index:1000;
}

.sidebar a{
    display:block;
    padding:15px 25px;
    text-decoration:none;
    color:#0d6efd;
    font-weight:500;
    transition:0.3s;
}

.sidebar a:hover{
    background:#eef6ff;
}

.sidebar.active{
    left:0;
}

/* MAIN CONTENT */
.container{
    padding:40px;
    transition:0.4s;
}

.container.shift{
    margin-left:250px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    margin-bottom:40px;
}

h3{
    color:#0d6efd;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    border-bottom:1px solid #eee;
    font-size:13px;
}

tr:hover{
    background:#eef6ff;
}

select, textarea{
    width:100%;
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
    margin-top:4px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

.delete-btn{
    background:#dc3545;
}
.delete-btn:hover{
    background:#bb2d3b;
}

.reason-box{
    display:none;
    margin-top:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    Gram Panchayat Sarpanch Dashboard
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Citizen Problems</a>
    <a href="#">Development Works</a>
    <a href="#">Reports</a>
    <a href="#">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

<!-- Citizen Problems -->
<div class="card">
<h3>Citizen Problems</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Aadhaar</th>
<th>Title</th>
<th>Description</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="problemRows"></tbody>
</table>
</div>

<!-- Development Works -->
<div class="card">
<h3>Development Works</h3>
<table>
<thead>
<tr>
<th>Work ID</th>
<th>Name</th>
<th>Type</th>
<th>Area</th>
<th>Budget</th>
<th>Status</th>
</tr>
</thead>
<tbody id="workRows"></tbody>
</table>
</div>

</div>

<script>

/* SIDEBAR TOGGLE */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("mainContent").classList.toggle("shift");
}

/* LOAD PROBLEMS */
let problems = JSON.parse(localStorage.getItem("problems")) || [];
let problemRows = document.getElementById("problemRows");

if(problems.length===0){
    problemRows.innerHTML=`<tr><td colspan="7" align="center">No problems submitted</td></tr>`;
}else{
    problems.forEach((p,i)=>{
        problemRows.innerHTML+=`
        <tr>
            <td>${p.problemId}</td>
            <td>${p.aadhaar}</td>
            <td>${p.title}</td>
            <td>${p.description||"-"}</td>
            <td>${p.submittedAt}</td>
            <td>
                <select id="status${i}" onchange="toggleReason(${i})">
                    <option ${p.status==="Submitted"?"selected":""}>Submitted</option>
                    <option ${p.status==="In Progress"?"selected":""}>In Progress</option>
                    <option ${p.status==="Resolved"?"selected":""}>Resolved</option>
                    <option ${p.status==="Rejected"?"selected":""}>Rejected</option>
                </select>
                <div class="reason-box" id="reasonBox${i}">
                    <textarea id="reason${i}" placeholder="Rejection reason">${p.rejectReason||""}</textarea>
                </div>
            </td>
            <td>
                <button onclick="updateStatus(${i})">Update</button>
                <button class="delete-btn" onclick="deleteProblem(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

/* STATUS UPDATE */
function toggleReason(i){
    let status=document.getElementById("status"+i).value;
    document.getElementById("reasonBox"+i).style.display=
    status==="Rejected"?"block":"none";
}

function updateStatus(i){
    let status=document.getElementById("status"+i).value;
    let reason=document.getElementById("reason"+i)?.value;

    if(status==="Rejected" && !reason){
        alert("Rejection reason required");
        return;
    }

    problems[i].status=status;
    problems[i].rejectReason=status==="Rejected"?reason:"";

    localStorage.setItem("problems",JSON.stringify(problems));
    alert("Status Updated");
}

function deleteProblem(i){
    if(!confirm("Delete this problem?")) return;
    problems.splice(i,1);
    localStorage.setItem("problems",JSON.stringify(problems));
    location.reload();
}

/* LOAD WORKS */
let works=JSON.parse(localStorage.getItem("developmentWorks"))||[];
let workRows=document.getElementById("workRows");

if(works.length===0){
    workRows.innerHTML=`<tr><td colspan="6" align="center">No development works created</td></tr>`;
}else{
    works.forEach(w=>{
        workRows.innerHTML+=`
        <tr>
            <td>${w.id}</td>
            <td>${w.name}</td>
            <td>${w.type}</td>
            <td>${w.area}</td>
            <td>₹ ${w.budget}</td>
            <td>${w.status||"Pending"}</td>
        </tr>`;
    });
}
</script>

</body>
</html>
